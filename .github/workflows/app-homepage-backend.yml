# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: app-homepage-backend ci/cd

on:
  workflow_dispatch:
    inputs:
      do_build:
        description: execute build job
        type: boolean
        required: true
        default: true
      do_depoly:
        description: execute deploy job.
        type: boolean
        required: true
        default: true

jobs:
  build:
    if: ${{ inputs.do_build }}
    environment: APP_HOMEPAGE_BACKEND
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Gradle Wrapper
        run: ./gradlew module:application:app-homepage-backend:build -Dmode=prod

      - name: Docker Image Build
        run: docker build -f ./script/backend/app-homepage-backend/Dockerfile -t app-homepage-backend .

      - name: Docker Image Save
        run: docker save -o app-homepage-backend.tar app-homepage-backend

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-homepage-backend-image
          path: app-homepage-backend.tar
          retention-days: 1

  deploy:
    if: always() && (needs.build.result == 'skipped' || needs.build.result == 'success') && inputs.do_depoly
    needs:
      - build
    environment: APP_HOMEPAGE_BACKEND
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COMPOSE_FILE_LOC: "/var/services/homes/github-cd/app-homepage-backend/docker-compose-deploy.yml"
      IMAGE_DEST_PATH: "/var/services/homes/github-cd/app-homepage-backend/app-homepage-backend.tar"
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-homepage-backend-image

      - name: Copy Docker Image to Remote Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "app-homepage-backend.tar"
          target: "/var/services/homes/github-cd/app-homepage-backend/"

      - name: Deploy Remote Server
        uses: appleboy/ssh-action@v1
        with:
          username: ${{ secrets.SSH_USERNAME }}
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            /usr/local/bin/docker load -i ${{ env.IMAGE_DEST_PATH }}
            /usr/local/bin/docker-compose -f ${{ env.COMPOSE_FILE_LOC }} down
            /usr/local/bin/docker-compose -f ${{ env.COMPOSE_FILE_LOC }} up -d
            rm ${{ env.IMAGE_DEST_PATH }}

  dependency-submission:
    if: inputs.do_build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
      # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
