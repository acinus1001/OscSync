name: front-homepage.yml

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      REMOTE_TARGET_DIR: "/var/services/homes/github-cd/frontend-homepage/pages/kuro9-dev"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Frontend
        run: ./gradlew :module-front:application:app-homepage:jsBrowserDistribution -Dmode=prod

      - name: Copy Frontend Files to Remote Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}

          source: "module-front/application/app-homepage/build/dist/js/productionExecutable/*"
          target: "${{ env.REMOTE_TARGET_DIR }}"

          strip_components: 6
          overwrite: true
          rm: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}

          script: |
            docker exec nginx-kuro9-main nginx -t
            docker exec nginx-kuro9-main nginx -s reload