name: front-homepage.yml

on:
  workflow_dispatch:

jobs:
  build-and-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew :module-front:application:app-homepage:jsBrowserDistribution -Dmode=prod

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-homepage-dist
          path: module-front/application/app-homepage/build/dist/js/productionExecutable/
          if-no-files-found: error
